services:
  tomcat:
    image: tomcat:9.0-jre21
    networks:
      - app_net
    volumes:
      - ./tomcat-root:/usr/local/tomcat/webapps/ROOT:ro

  proxy:
    image: nginx:latest
    ports:
      - "8080:80"
    networks:
      - app_net
    depends_on:
      - tomcat
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
networks:
  app_net:
    driver: bridge