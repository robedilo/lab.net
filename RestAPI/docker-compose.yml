services:
  restapi:
    build: .
    expose:
      - "5000"
    volumes:
      - .:/app
    restart: unless-stopped

  proxy:
    image: nginx:latest
    ports:
      - "8080:80"
    depends_on:
      - restapi
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped