# File personalizzato da Roberto per la sostituzione all'interno del file /etc/nginx/conf.d/default.conf
resolver 127.0.0.11 valid=10s;

upstream tomcat_upstream {
    zone tomcat_upstream 64k;
    server tomcat:8080 resolve;
}
server {
    listen 80;

    location / {
       proxy_pass http://tomcat_upstream;
    
       proxy_set_header Host $host;
       proxy_set_header X-Real-IP $remote_addr;
       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
       proxy_set_header X-Forwarded-Proto $scheme;
    }
}
